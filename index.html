<!DOCTYPE html>
<html>
<head>

<title>Personal Finance Tracker</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<header>

<h1>💰 Finance Tracker</h1>

<button id="darkBtn">
🌙 Dark Mode
</button>

</header>



<div class="container">


<div class="balance">

<h2>Balance</h2>

<h1 id="balance">
₹0
</h1>

</div>




<div class="summary">

<div>
<h3>Income</h3>
<p id="income">₹0</p>
</div>


<div>
<h3>Expense</h3>
<p id="expense">₹0</p>
</div>


</div>





<div class="form">


<input id="title"
placeholder="Transaction name">



<input id="amount"
type="number"
placeholder="Amount">



<select id="type">

<option value="income">
Income
</option>


<option value="expense">
Expense
</option>


</select>



<button onclick="addTransaction()">
Add
</button>


</div>




<h2>
Transactions
</h2>


<ul id="list">

</ul>


</div>




<script src="script.js"></script>


</body>
</html>
