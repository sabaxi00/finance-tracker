<!DOCTYPE html>
<html>
<head>

<title>Financial Tracker</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="top">

<h1>💰 Financial Tracker</h1>

<button onclick="darkMode()">🌙 Dark Mode</button>

</div>



<div class="container">


<div class="balance">

<h3>Your Balance</h3>

<h2>₹ <span id="balance">0</span></h2>

</div>




<div class="card">


<h2>Add Transaction</h2>


<input 
id="text"
placeholder="Transaction name">


<input 
id="amount"
type="number"
placeholder="Amount">



<select id="type">

<option value="income">
Income
</option>


<option value="expense">
Expense
</option>


</select>



<button onclick="addTransaction()">
Add
</button>


</div>





<div class="card">


<h2>History</h2>


<ul id="list"></ul>


</div>


</div>



<script src="script.js"></script>


</body>

</html>
